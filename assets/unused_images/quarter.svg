<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <!-- Background circle (light gray/dashed stroke or just light fill) -->
  <circle cx="100" cy="100" r="80" fill="#f5f5f5" stroke="#bbb" stroke-width="3" />
  
  <!-- One Quarter Slice (Top-Right quadrant) with a nice visible shade -->
  <path d="M 100 100 L 100 20 A 80 80 0 0 1 180 100 Z" fill="#2196f3" stroke="#0d47a1" stroke-width="3" />
  
  <!-- Subtle divider lines to show the quarters clearly -->
  <line x1="100" y1="20" x2="100" y2="180" stroke="#888" stroke-width="2" stroke-dasharray="5 5" />
  <line x1="20" y1="100" x2="180" y2="100" stroke="#888" stroke-width="2" stroke-dasharray="5 5" />
  
  <!-- Shading overlay for 1/4 label -->
  <circle cx="140" cy="60" r="10" fill="rgba(13, 71, 161, 0.2)" />
</svg>
