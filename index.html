<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أكاديمية 123 - الألعاب التفاعلية 🎈</title>
    <!-- Google Fonts for Cairo (Arabic) and Outfit (English) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-math: linear-gradient(135deg, #ffedbc 0%, #edc453 100%);
            --bg-arabic: linear-gradient(135deg, #baffc9 0%, #6cd68b 100%);
            --bg-english: linear-gradient(135deg, #bae1ff 0%, #5cb3f7 100%);
            --primary-math: #dca30f;
            --primary-arabic: #2ca751;
            --primary-english: #1583d8;
            --card-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: 'Cairo', 'Outfit', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #fef9e7 0%, #f1f5f9 100%);
            transition: background 0.5s ease;
            overflow-x: hidden;
        }

        .container {
            width: 95%;
            max-width: 650px;
            padding: 20px;
            box-sizing: border-box;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 40px 25px;
            text-align: center;
            box-shadow: var(--card-shadow);
            border: 8px solid #ffffff;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        /* Top ribbon/badge for Age & Subject */
        .badge-ribbon {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            background: #ff6b6b;
            color: white;
            font-weight: 900;
            padding: 8px 30px;
            border-radius: 0 0 20px 20px;
            font-size: 16px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            letter-spacing: 0.5px;
            white-space: nowrap;
        }

        /* Progress Bar */
        .progress-container {
            width: 100%;
            height: 16px;
            background: #f1f5f9;
            border-radius: 50px;
            margin: 25px 0 10px 0;
            overflow: hidden;
            border: 2px solid #e2e8f0;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: #ff6b6b;
            border-radius: 50px;
            transition: width 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        h1, h2, h3 {
            margin-top: 10px;
            color: #334155;
            font-weight: 900;
        }

        h2.question-text {
            font-size: 24px;
            line-height: 1.4;
            margin: 20px 0;
            color: #1e293b;
        }

        .instructions {
            font-size: 18px;
            color: #64748b;
            margin-bottom: 20px;
            font-weight: 700;
        }

        /* General Buttons */
        .btn-action {
            background: #ff6b6b;
            color: white;
            border: none;
            border-radius: 50px;
            padding: 16px 40px;
            font-size: 20px;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 6px 15px rgba(255, 107, 107, 0.4);
            transition: all 0.2s ease;
            margin-top: 20px;
        }

        .btn-action:hover {
            transform: scale(1.05);
            background: #ff5252;
        }

        /* Option Grid (Multiple Choice / Audio Choice) */
        .options-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        .options-grid.two-columns {
            grid-template-columns: 1fr 1fr;
        }

        .btn-option {
            background-color: #ffffff;
            color: #334155;
            border: 4px solid #e2e8f0;
            border-radius: 24px;
            padding: 15px 20px;
            font-size: 22px;
            font-weight: bold;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 6px 0 #e2e8f0;
            position: relative;
            top: 0;
            outline: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-option img {
            width: 100px;
            height: 100px;
            object-fit: contain;
            pointer-events: none;
            border-radius: 12px;
        }

        /* Image displayed in the middle of a question */
        .question-image-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
        }

        .question-image {
            width: 140px;
            height: 140px;
            object-fit: contain;
            border-radius: 16px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.05);
            background-color: #fff;
            padding: 10px;
            border: 3px solid #f1f5f9;
        }

        .btn-option:hover {
            transform: translateY(-2px);
            border-color: #cbd5e1;
            box-shadow: 0 8px 0 #cbd5e1;
        }

        .btn-option:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #cbd5e1;
        }

        /* Audio Question UI */
        .audio-button-container {
            margin: 20px 0;
            display: flex;
            justify-content: center;
        }

        .btn-audio {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: #ff7675;
            border: 6px solid #ffffff;
            box-shadow: 0 10px 20px rgba(255, 118, 117, 0.4);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: white;
            transition: all 0.2s ease;
            outline: none;
        }

        .btn-audio:hover {
            transform: scale(1.1);
        }

        .btn-audio:active {
            transform: scale(0.95);
        }

        /* Drag & Drop Playground */
        .drag-playground {
            display: flex;
            justify-content: space-around;
            align-items: flex-start;
            margin-top: 30px;
            min-height: 250px;
            gap: 20px;
            position: relative;
        }

        .drag-column, .drop-column {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 45%;
        }

        .drag-item {
            background-color: #ffffff;
            color: #2c3e50;
            border: 4px solid #90caf9;
            border-radius: 20px;
            padding: 20px;
            font-size: 32px;
            font-weight: 900;
            box-shadow: 0 6px 0 #90caf9;
            cursor: grab;
            user-select: none;
            touch-action: none;
            position: relative;
            z-index: 100;
            text-align: center;
            transition: transform 0.1s ease;
        }

        .drag-item.dragging {
            cursor: grabbing;
            opacity: 0.8;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
            z-index: 1000;
        }

        .drop-target {
            background-color: #f8fafc;
            border: 4px dashed #94a3b8;
            color: #64748b;
            border-radius: 20px;
            padding: 20px;
            font-size: 28px;
            font-weight: 800;
            min-height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            transition: all 0.3s ease;
        }

        .drop-target.hovered {
            background-color: #f1f5f9;
            border-color: #3b82f6;
            transform: scale(1.02);
        }

        .drop-target.matched {
            background-color: #e8f5e9;
            border: 4px solid #4caf50;
            color: #2e7d32;
            box-shadow: 0 4px 10px rgba(76, 175, 80, 0.2);
        }

        /* Color profiles based on subject */
        .math-theme .btn-option { border-color: #ffe082; box-shadow: 0 6px 0 #ffd54f; }
        .math-theme .btn-option:hover { background-color: #fffde7; border-color: #ffd54f; }
        .math-theme .progress-bar { background-color: var(--primary-math); }

        .arabic-theme .btn-option { border-color: #c8e6c9; box-shadow: 0 6px 0 #a5d6a7; }
        .arabic-theme .btn-option:hover { background-color: #e8f5e9; border-color: #a5d6a7; }
        .arabic-theme .progress-bar { background-color: var(--primary-arabic); }

        .english-theme .btn-option { border-color: #bbdefb; box-shadow: 0 6px 0 #90caf9; }
        .english-theme .btn-option:hover { background-color: #e3f2fd; border-color: #90caf9; }
        .english-theme .progress-bar { background-color: var(--primary-english); }

        /* Celebration Confetti */
        #confetti-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        .student-welcome {
            font-size: 20px;
            color: #475569;
            background: #f8fafc;
            padding: 10px 20px;
            border-radius: 50px;
            display: inline-block;
            margin-top: 15px;
            border: 2px dashed #cbd5e1;
        }

        /* RTL/LTR Dynamic Classes */
        .ltr-layout { direction: ltr; text-align: left; }
        .ltr-layout .badge-ribbon { direction: ltr; }
    </style>
</head>
<body class="english-theme">

<div class="container">
    <div class="card" id="main-card">
        <canvas id="confetti-canvas"></canvas>
        <div class="badge-ribbon" id="badge-title">Loading...</div>
        
        <!-- WELCOME SCREEN -->
        <div id="welcome-screen">
            <h1 style="font-size: 30px; margin-top: 40px;" id="welcome-title">Loading...</h1>
            <div id="student-info" class="student-welcome">Loading...</div>
            <p id="welcome-instructions" class="instructions" style="margin-top: 20px;"></p>
            <button class="btn-action" id="btn-start" onclick="startQuiz()">Start 🚀</button>
            <br>
            <button class="btn-action" id="btn-dashboard" onclick="goToDashboard()" style="background: #475569; box-shadow: 0 6px 15px rgba(71, 85, 105, 0.4); margin-top: 10px; font-size: 16px; padding: 10px 25px;">📊 Progress Dashboard</button>
        </div>

        <!-- QUIZ SCREEN -->
        <div id="quiz-screen" style="display: none;">
            <div class="progress-container">
                <div class="progress-bar" id="progress-indicator"></div>
            </div>
            <div id="progress-text" style="font-size: 14px; font-weight: bold; color: #64748b;">Question 1 of 5</div>
            
            <h2 class="question-text" id="question-label">Question Text</h2>
            
            <!-- Dynamic Work Area -->
            <div id="quiz-work-area">
                <!-- Question types will render inside this container -->
            </div>
        </div>

        <!-- END SCREEN -->
        <div id="end-screen" style="display: none;">
            <div class="celebration-emoji" id="end-emoji">🎉</div>
            <h1 id="end-title">Excellent!</h1>
            <p class="instructions" id="end-message">Quiz completed!</p>
            <div id="webhook-status" style="font-size: 14px; color: #94a3b8; margin-top: 10px;">Saving result... 💾</div>
            <br>
            <button class="btn-action" id="btn-dashboard-end" onclick="goToDashboard()" style="background: #475569; box-shadow: 0 6px 15px rgba(71, 85, 105, 0.4); margin-top: 15px; font-size: 16px; padding: 10px 25px; display: inline-block;">📊 View Dashboard</button>
        </div>
    </div>
</div>

<script src="quiz_parser.js"></script>
<script>
    // 1. Setup Audio Synthesis (Web Audio API for effects)
    let audioCtx = null;
    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtx.state === 'suspended') {
            audioCtx.resume();
        }
    }

    function playSound(type) {
        try {
            initAudio();
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;

            if (type === 'correct') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(440, now);
                osc.frequency.exponentialRampToValueAtTime(880, now + 0.2);
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.35);
                osc.start(now);
                osc.stop(now + 0.35);
            } else if (type === 'wrong') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(220, now);
                osc.frequency.linearRampToValueAtTime(110, now + 0.3);
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                osc.start(now);
                osc.stop(now + 0.3);
            } else if (type === 'victory') {
                const notes = [261.63, 329.63, 392.00, 523.25];
                notes.forEach((freq, index) => {
                    const oscNote = audioCtx.createOscillator();
                    const gainNote = audioCtx.createGain();
                    oscNote.connect(gainNote);
                    gainNote.connect(audioCtx.destination);
                    oscNote.type = 'sine';
                    oscNote.frequency.setValueAtTime(freq, now + index * 0.1);
                    gainNote.gain.setValueAtTime(0.08, now + index * 0.1);
                    gainNote.gain.exponentialRampToValueAtTime(0.001, now + index * 0.1 + 0.3);
                    oscNote.start(now + index * 0.1);
                    oscNote.stop(now + index * 0.1 + 0.3);
                });
            }
        } catch (e) {
            console.warn('Audio Context error: ', e);
        }
    }

    // Web Speech API for Listen & Answer pronunciation
    function speakText(text, lang = 'en-US') {
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel(); // stop current speech
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = lang;
            utterance.rate = 0.75; // clear and slow for children
            window.speechSynthesis.speak(utterance);
        } else {
            console.warn("Speech Synthesis API not supported in this browser.");
        }
    }

    // 2. Confetti Particle System
    let canvas = document.getElementById('confetti-canvas');
    let ctx = canvas.getContext('2d');
    let particles = [];
    let isConfettiActive = false;

    function resizeCanvas() {
        const rect = document.getElementById('main-card').getBoundingClientRect();
        canvas.width = rect.width;
        canvas.height = rect.height;
    }
    window.addEventListener('resize', resizeCanvas);

    class Particle {
        constructor() {
            this.x = Math.random() * canvas.width;
            this.y = -10;
            this.size = Math.random() * 8 + 4;
            this.color = ['#ff6b6b', '#ffd54f', '#4caf50', '#2196f3', '#e040fb'][Math.floor(Math.random() * 5)];
            this.speedX = Math.random() * 4 - 2;
            this.speedY = Math.random() * 3 + 2;
            this.rotation = Math.random() * 360;
            this.rotationSpeed = Math.random() * 10 - 5;
        }
        update() {
            this.x += this.speedX;
            this.y += this.speedY;
            this.rotation += this.rotationSpeed;
        }
        draw() {
            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.rotate((this.rotation * Math.PI) / 180);
            ctx.fillStyle = this.color;
            ctx.fillRect(-this.size / 2, -this.size / 2, this.size, this.size);
            ctx.restore();
        }
    }

    function spawnConfetti() {
        isConfettiActive = true;
        resizeCanvas();
        for (let i = 0; i < 100; i++) {
            particles.push(new Particle());
        }
        requestAnimationFrame(updateConfetti);
    }

    function updateConfetti() {
        if (!isConfettiActive) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for (let i = particles.length - 1; i >= 0; i--) {
            particles[i].update();
            particles[i].draw();
            if (particles[i].y > canvas.height) {
                particles.splice(i, 1);
            }
        }
        if (particles.length > 0) {
            requestAnimationFrame(updateConfetti);
        } else {
            isConfettiActive = false;
        }
    }

    // 3. Quiz Game Logic
    // ==========================================
    // CONFIGURATION: Paste your deployed Google Apps Script Web App URL here
    // ==========================================
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzV5gDBaphmPbUFS8c7RMyhX010t2Ber8VMieoLEmDDCHOfT2FrElgCXV6TjxcUdqPbUw/exec";

    const urlParams = new URLSearchParams(window.location.search);
    const studentId = urlParams.get('student_id') || "test_user";
    const skillId = urlParams.get('skill') || "english_3_s1";
    const studentName = urlParams.get('student_name') || "طالبنا المميز";

    let activeLevelData = null;
    let selectedQuizQuestions = [];
    let currentQuestionIndex = 0;
    let score = 0;
    let currentQuestionFirstAttempt = true;
    let activeQuizConfig = null;

    // Load subject configuration and curriculum dynamically via modular quiz_parser.js
    loadQuizEngine(skillId)
        .then(result => {
            selectedQuizQuestions = result.questions;
            activeLevelData = result.activeLevelData;
            activeQuizConfig = result.quizConfig;
            
            initApp();
        })
        .catch(err => {
            console.error('Failed to load quiz data:', err);
            document.getElementById('badge-title').innerText = 'Error!';
            document.getElementById('student-info').innerText = 'Could not load the curriculum questions.';
        });

    function initApp() {
        const subject = activeLevelData.subject;
        const isEnglish = (subject === 'english');

        // Apply theme backgrounds
        document.body.className = '';
        document.body.classList.add(subject + '-theme');
        if (subject === 'math') document.body.style.background = 'var(--bg-math)';
        else if (subject === 'arabic') document.body.style.background = 'var(--bg-arabic)';
        else if (subject === 'english') document.body.style.background = 'var(--bg-english)';

        // Adjust language layout
        if (isEnglish) {
            document.documentElement.dir = 'ltr';
            document.documentElement.lang = 'en';
            document.getElementById('main-card').classList.add('ltr-layout');
            
            document.getElementById('badge-title').innerText = `Level: ${activeLevelData.title_en}`;
            document.getElementById('welcome-title').innerText = "Welcome to the Quiz Challenge! 🌟";
            document.getElementById('student-info').innerText = `Welcome, ${studentName}! ⭐`;
            document.getElementById('welcome-instructions').innerText = activeLevelData.instructions_en;
            document.getElementById('btn-start').innerText = "Start the Game! 🚀";
            document.getElementById('btn-dashboard').innerText = "📊 View Progress Dashboard";
            document.getElementById('btn-dashboard-end').innerText = "📊 View Progress Dashboard";
        } else {
            document.documentElement.dir = 'rtl';
            document.documentElement.lang = 'ar';
            document.getElementById('main-card').classList.remove('ltr-layout');

            document.getElementById('badge-title').innerText = `${activeLevelData.title_ar} (عمر ${activeLevelData.age_group} سنوات)`;
            document.getElementById('welcome-title').innerText = "مرحباً بك في تحدي الأذكياء! 🌟";
            document.getElementById('student-info').innerText = `مرحباً بك يا ${studentName}! ⭐`;
            document.getElementById('welcome-instructions').innerText = activeLevelData.instructions_ar;
            document.getElementById('btn-start').innerText = "ابدأ اللعبة الآن 🚀";
            document.getElementById('btn-dashboard').innerText = "📊 لوحة المتابعة والتقدم";
            document.getElementById('btn-dashboard-end').innerText = "📊 عرض لوحة المتابعة";
        }
    }



    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function startQuiz() {
        initAudio();
        document.getElementById('welcome-screen').style.display = 'none';
        document.getElementById('quiz-screen').style.display = 'block';
        loadQuestion();
    }

    // 5. Load and Render Question Types
    function loadQuestion() {
        currentQuestionFirstAttempt = true;
        const isEnglish = (activeLevelData.subject === 'english');
        const q = selectedQuizQuestions[currentQuestionIndex];
        
        // Update Progress Bar
        const progressPercent = (currentQuestionIndex / selectedQuizQuestions.length) * 100;
        document.getElementById('progress-indicator').style.width = progressPercent + '%';
        
        // Update Progress Text
        if (isEnglish) {
            document.getElementById('progress-text').innerText = `Question ${currentQuestionIndex + 1} of ${selectedQuizQuestions.length}`;
        } else {
            document.getElementById('progress-text').innerText = `السؤال ${currentQuestionIndex + 1} من ${selectedQuizQuestions.length}`;
        }

        // Load Question Text
        document.getElementById('question-label').innerText = q.question;

        // Render based on Question Type
        const workArea = document.getElementById('quiz-work-area');
        workArea.innerHTML = '';

        if (q.type === 'multiple-choice') {
            renderMultipleChoice(q, workArea);
        } else if (q.type === 'audio-choice') {
            renderAudioChoice(q, workArea);
        } else if (q.type === 'drag-and-drop') {
            renderDragAndDrop(q, workArea);
        }
    }

    // Multiple Choice
    function renderMultipleChoice(q, container) {
        // If question has an image card, render it above the options
        if (q.image) {
            const imgContainer = document.createElement('div');
            imgContainer.className = 'question-image-container';
            
            const img = document.createElement('img');
            img.src = q.image;
            img.alt = q.question;
            img.className = 'question-image';
            
            imgContainer.appendChild(img);
            container.appendChild(imgContainer);
        }

        const grid = document.createElement('div');
        grid.className = 'options-grid';
        
        q.options.forEach(opt => {
            const button = document.createElement('button');
            button.className = 'btn-option';
            button.innerText = opt;
            button.onclick = () => selectAnswer(opt, q.correct, button, grid);
            grid.appendChild(button);
        });
        container.appendChild(grid);
    }

    // Listen & Answer
    function renderAudioChoice(q, container) {
        // Speaker Button
        const audioContainer = document.createElement('div');
        audioContainer.className = 'audio-button-container';
        
        const speakBtn = document.createElement('button');
        speakBtn.className = 'btn-audio';
        speakBtn.innerHTML = '🔊';
        speakBtn.onclick = () => speakText(q.speak_text);
        audioContainer.appendChild(speakBtn);
        container.appendChild(audioContainer);

        // Auto-play sound immediately when question loads
        setTimeout(() => speakText(q.speak_text), 500);

        // Render Options Grid (supporting Cartoon Images!)
        const grid = document.createElement('div');
        grid.className = 'options-grid two-columns';

        q.options.forEach(opt => {
            const button = document.createElement('button');
            button.className = 'btn-option';
            
            // If option contains an image path
            if (opt.image) {
                const img = document.createElement('img');
                img.src = opt.image;
                img.alt = opt.text;
                button.appendChild(img);
            }
            
            const label = document.createElement('span');
            label.innerText = opt.text;
            button.appendChild(label);
            
            button.onclick = () => selectAnswer(opt.text, q.correct, button, grid);
            grid.appendChild(button);
        });
        container.appendChild(grid);
    }

    // Native Drag and Drop (optimized for Mouse & Swipe touch screens)
    function renderDragAndDrop(q, container) {
        const playground = document.createElement('div');
        playground.className = 'drag-playground';

        const dragCol = document.createElement('div');
        dragCol.className = 'drag-column';
        const dropCol = document.createElement('div');
        dropCol.className = 'drop-column';

        // Render items to drag
        q.items.forEach(item => {
            const el = document.createElement('div');
            el.className = 'drag-item';
            el.id = item.id;
            el.innerText = item.text;
            dragCol.appendChild(el);
            
            // Setup Drag Event Listeners
            setupDragListeners(el, q);
        });

        // Render drop targets
        q.targets.forEach(target => {
            const el = document.createElement('div');
            el.className = 'drop-target';
            el.id = target.id;
            el.innerText = target.text;
            el.dataset.matches = target.matches;
            dropCol.appendChild(el);
        });

        playground.appendChild(dragCol);
        playground.appendChild(dropCol);
        container.appendChild(playground);
    }

    // Native Mouse & Touch Drag and Drop script
    function setupDragListeners(el, q) {
        let active = false;
        let currentX;
        let currentY;
        let initialX;
        let initialY;
        let xOffset = 0;
        let yOffset = 0;

        el.addEventListener("touchstart", dragStart, { passive: false });
        el.addEventListener("touchend", dragEnd, { passive: false });
        el.addEventListener("touchmove", drag, { passive: false });

        el.addEventListener("mousedown", dragStart);
        el.addEventListener("mouseup", dragEnd);
        el.addEventListener("mousemove", drag);

        function dragStart(e) {
            if (el.classList.contains('matched')) return;

            if (e.type === "touchstart") {
                initialX = e.touches[0].clientX - xOffset;
                initialY = e.touches[0].clientY - yOffset;
            } else {
                initialX = e.clientX - xOffset;
                initialY = e.clientY - yOffset;
            }

            active = true;
            el.classList.add('dragging');
        }

        function drag(e) {
            if (active) {
                e.preventDefault();
                
                if (e.type === "touchmove") {
                    currentX = e.touches[0].clientX - initialX;
                    currentY = e.touches[0].clientY - initialY;
                } else {
                    currentX = e.clientX - initialX;
                    currentY = e.clientY - initialY;
                }

                xOffset = currentX;
                yOffset = currentY;

                setTranslate(currentX, currentY, el);
                
                // Check if hovering over any targets
                const rect = el.getBoundingClientRect();
                const hoverEl = document.elementFromPoint(rect.left + rect.width/2, rect.top + rect.height/2);
                
                document.querySelectorAll('.drop-target').forEach(t => t.classList.remove('hovered'));
                if (hoverEl && hoverEl.classList.contains('drop-target')) {
                    hoverEl.classList.add('hovered');
                }
            }
        }

        function dragEnd(e) {
            if (!active) return;
            active = false;
            el.classList.remove('dragging');

            const rect = el.getBoundingClientRect();
            // Get element at center of the dragged card
            const dropTarget = getOverlappingDropTarget(rect);

            if (dropTarget && !dropTarget.classList.contains('matched')) {
                const targetMatches = dropTarget.dataset.matches;
                
                if (targetMatches === el.id) {
                    // Correct Match!
                    playSound('correct');
                    dropTarget.classList.remove('hovered');
                    dropTarget.classList.add('matched');
                    dropTarget.innerText = `${el.innerText} ↔ ${dropTarget.innerText}`;
                    el.remove(); // Remove original block
                    
                    checkDragAndDropCompletion();
                    return;
                }
            }

            // Wrong drop / missed: animate back to origin
            playSound('wrong');
            currentQuestionFirstAttempt = false; // Made a mistake on this matching question
            document.querySelectorAll('.drop-target').forEach(t => t.classList.remove('hovered'));
            resetItemPosition();
        }

        function getOverlappingDropTarget(rect) {
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            
            let matchedTarget = null;
            document.querySelectorAll('.drop-target').forEach(target => {
                const tRect = target.getBoundingClientRect();
                if (centerX >= tRect.left && centerX <= tRect.right &&
                    centerY >= tRect.top && centerY <= tRect.bottom) {
                    matchedTarget = target;
                }
            });
            return matchedTarget;
        }

        function setTranslate(xPos, yPos, el) {
            el.style.transform = `translate3d(${xPos}px, ${yPos}px, 0)`;
        }

        function resetItemPosition() {
            el.style.transition = 'transform 0.3s ease';
            el.style.transform = 'translate3d(0px, 0px, 0)';
            xOffset = 0;
            yOffset = 0;
            setTimeout(() => { el.style.transition = ''; }, 300);
        }
    }

    function checkDragAndDropCompletion() {
        const totalTargets = document.querySelectorAll('.drop-target').length;
        const matchedTargets = document.querySelectorAll('.drop-target.matched').length;

        if (totalTargets === matchedTargets) {
            // Completed the drag-and-drop question successfully!
            if (currentQuestionFirstAttempt) {
                score++;
            }
            setTimeout(() => {
                currentQuestionIndex++;
                if (currentQuestionIndex < selectedQuizQuestions.length) {
                    loadQuestion();
                } else {
                    endQuiz(); // Completed the entire quiz
                }
            }, 1200);
        }
    }

    function selectAnswer(selected, correct, button, container) {
        // Disable all buttons in options grid to prevent spam clicking
        container.querySelectorAll('button').forEach(btn => {
            btn.disabled = true;
            btn.style.pointerEvents = 'none';
        });

        if (selected === correct) {
            playSound('correct');
            button.style.backgroundColor = '#4caf50';
            button.style.color = '#fff';
            button.style.borderColor = '#4caf50';
            button.style.boxShadow = '0 6px 0 #388e3c';

            if (currentQuestionFirstAttempt) {
                score++;
            }

            setTimeout(() => {
                currentQuestionIndex++;
                if (currentQuestionIndex < selectedQuizQuestions.length) {
                    loadQuestion();
                } else {
                    endQuiz();
                }
            }, 1000);
        } else {
            playSound('wrong');
            currentQuestionFirstAttempt = false;
            button.style.backgroundColor = '#f44336';
            button.style.color = '#fff';
            button.style.borderColor = '#f44336';
            button.style.boxShadow = '0 6px 0 #d32f2f';

            // Highlight the correct option
            container.querySelectorAll('button').forEach(btn => {
                let optText = btn.innerText || "";
                // If it's a dynamic image button, extract the span label
                const labelSpan = btn.querySelector('span');
                if (labelSpan) {
                    optText = labelSpan.innerText;
                }
                
                if (optText.trim() === correct.trim()) {
                    btn.style.backgroundColor = '#4caf50';
                    btn.style.color = '#fff';
                    btn.style.borderColor = '#4caf50';
                    btn.style.boxShadow = '0 6px 0 #388e3c';
                }
            });

            setTimeout(() => {
                currentQuestionIndex++;
                if (currentQuestionIndex < selectedQuizQuestions.length) {
                    loadQuestion();
                } else {
                    endQuiz();
                }
            }, 1500);
        }
    }

    // 6. Complete and submit results
    function endQuiz() {
        const isPassed = (score >= (activeQuizConfig ? activeQuizConfig.passing_score : 4));
        
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('end-screen').style.display = 'block';
        
        const isEnglish = (activeLevelData.subject === 'english');
        const endEmoji = document.getElementById('end-emoji');
        const endTitle = document.getElementById('end-title');
        const endMessage = document.getElementById('end-message');
        const statusLabel = document.getElementById('webhook-status');

        // Render final score on screen
        const scoreDisplay = isEnglish ? `Your Score: ${score} / ${selectedQuizQuestions.length}` : `درجتك: ${score} من ${selectedQuizQuestions.length}`;

        if (isPassed) {
            playSound('victory');
            spawnConfetti();
            endEmoji.innerText = "🏆";
            if (isEnglish) {
                endTitle.innerText = "Super Job!";
                endMessage.innerText = `You are a superstar! ⭐\n${scoreDisplay}`;
                statusLabel.innerText = "Saving your awesome result...";
            } else {
                endTitle.innerText = "عمل رائع ومتميز!";
                endMessage.innerText = `أنت بطل حقيقي! ⭐\n${scoreDisplay}`;
                statusLabel.innerText = "جاري حفظ النتيجة الجميلة...";
            }
        } else {
            endEmoji.innerText = "🎈";
            if (isEnglish) {
                endTitle.innerText = "Good Try!";
                endMessage.innerText = `Keep practicing, you will get it next time! 🌟\n${scoreDisplay}`;
                statusLabel.innerText = "Saving result...";
            } else {
                endTitle.innerText = "محاولة جيدة!";
                endMessage.innerText = `استمر في التدريب، وسوف تنجح في المرة القادمة بكل تأكيد! 🌟\n${scoreDisplay}`;
                statusLabel.innerText = "جاري حفظ النتيجة...";
            }
        }

        // Submit to Make.com Webhook & Google Apps Script
        const webhookUrl = 'https://hook.eu1.make.com/blip3kc8jb5qg8c2lmsasbclng7ntnxo';
        
        const payload = {
            student_id: studentId,
            student_name: studentName,
            skill_id: skillId,
            status: isPassed ? "Passed" : "Needs Review",
            score: score,
            total: selectedQuizQuestions.length,
            timestamp: new Date().toISOString()
        };

        const promises = [];
        
        // 1. Send to Make.com webhook
        promises.push(
            fetch(webhookUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
        );

        // 2. Send to Google Apps Script (if configured)
        if (APPS_SCRIPT_URL && APPS_SCRIPT_URL !== "YOUR_APPS_SCRIPT_WEB_APP_URL") {
            const appsScriptPayload = {
                student_id: studentId,
                student_name: studentName,
                skill_id: skillId,
                subject: activeLevelData.subject,
                level_title: isEnglish ? activeLevelData.title_en : activeLevelData.title_ar,
                score: score,
                total: selectedQuizQuestions.length,
                status: isPassed ? "Passed" : "Needs Review"
            };
            promises.push(
                fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify(appsScriptPayload)
                })
            );
        }

        Promise.all(promises)
        .then(responses => {
            if (responses.some(r => r.ok)) {
                statusLabel.innerText = isEnglish ? "Result saved successfully! 🎉" : "تم حفظ النتيجة بنجاح! 🎉";
            } else {
                throw new Error("Server error");
            }
        })
        .catch(err => {
            console.error('Failed to report score:', err);
            statusLabel.innerText = isEnglish ? "Saved offline. Let your teacher know! ❤️" : "تم التسجيل بنجاح! شكراً لك ❤️";
        });
    }

    function goToDashboard() {
        const dashboardUrl = `dashboard.html?student_id=${encodeURIComponent(studentId)}&skill=${encodeURIComponent(skillId)}&student_name=${encodeURIComponent(studentName)}`;
        window.location.href = dashboardUrl;
    }
